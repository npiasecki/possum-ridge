<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, height=device-height" />
        <title>Possum Ridge</title>
        <link rel="stylesheet" href="main.css" />
    </head>
    <body>
        <img id="possum-idle-left" src="assets/possum-idle-left.png" alt="Possum facing left" class="hidden" />
        <img id="possum-idle-right" src="assets/possum-idle-right.png" alt="Possum facing right" class="hidden" />
        <img id="possum-jump-right" src="assets/possum-jump-right.png" alt="Possum jumping while facing right" class="hidden" />
        <img id="possum-walk-left" src="assets/possum-walk-left.png" alt="Possum walking left" class="hidden" />
        <img id="possum-walk-right" src="assets/possum-walk-right.png" alt="Possum walking right" class="hidden" />
        <img id="tileset" src="assets/tileset.png" alt="Tileset" class="hidden" />
        <div id="device-wrapper">
            <img id="device" src="assets/device.png" usemap="#device-map" alt="Video game device"/>
            <map id="device-map" name="device-map">
                <area class="device-button" shape="circle" coords="300,361,20" href="#" alt="Button A" data-button-name="a" />
                <area class="device-button" shape="circle" coords="245,385,20" href="#" alt="Button B" data-button-name="b" />
                <area class="device-button" shape="rect" coords="60,337,88,362" href="#" alt="Up Button" data-button-name="up" />
                <area class="device-button" shape="rect" coords="60,393,88,418" href="#" alt="Down Button" data-button-name="down" />
                <area class="device-button" shape="rect" coords="34,364,59,391" href="#" alt="Left Button" data-button-name="left" />
                <area class="device-button" shape="rect" coords="92,364,115,391" href="#" alt="Right Button" data-button-name="right" />
                <area class="device-button" shape="poly" coords="108,464,113,470,148,451,143,444" href="#" alt="Select Button" data-button-name="select" />
                <area class="device-button" shape="poly" coords="166,464,170,470,205,451,200,444" href="#" alt="Start Button" data-button-name="start" />
            </map>
            <canvas id="canvas" width="160" height="144"></canvas>
        </div>
        <script src="main.js"></script>
    </body>
</html>
