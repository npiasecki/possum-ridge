<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, height=device-height" />
        <title>Possum Ridge</title>
        <link rel="stylesheet" href="main.css" />
    </head>
    <body>
        <img id="possum-idle-left" src="assets/possum-idle-left.png" alt="Possum facing left" class="hidden" />
        <img id="possum-idle-right" src="assets/possum-idle-right.png" alt="Possum facing right" class="hidden" />
        <img id="possum-jump-right" src="assets/possum-jump-right.png" alt="Possum jumping while facing right" class="hidden" />
        <img id="possum-walk-left" src="assets/possum-walk-left.png" alt="Possum walking left" class="hidden" />
        <img id="possum-walk-right" src="assets/possum-walk-right.png" alt="Possum walking right" class="hidden" />
        <img id="tileset" src="assets/tileset.png" alt="Tileset" class="hidden" />
        <div id="device-wrapper">
            <div id="device"></div>
            <canvas id="canvas" width="160" height="144"></canvas>
        </div>
        <script src="main.js"></script>
    </body>
</html>
